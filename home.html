<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Daisyui + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <header class=>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1 flex items-center gap-2 ml-9">
                <img class="w-[36px]" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-6">
                <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                <div class="rounded">
                    <button id="btn-search" class="btn btn-primary mr-5">Search</button>
                </div>
            </div>
        </div>

    </header>

    <section class="w-10/12 mx-auto mt-[60px] card  bg-base-100 card-xs shadow-sm">
        <div class="flex gap-3 p-5 ">
            <button onclick="toggleStyle('allBtn'); showAll() " id="allBtn"
                class="btn btn-primary w-[120px] ">All</button>
            <button onclick="toggleStyle('openBtn'); showOpen()" id="openBtn"
                class="btn btn-outline w-[120px] ">Open</button>
            <button onclick="toggleStyle('closedBtn'); showClosed()" id="closedBtn"
                class="btn btn-outline w-[120px] ">Closed</button>
        </div>
    </section>


    <section class="w-10/12 mx-auto mt-6 card  bg-base-100 card-xs shadow-sm p-4 ">
        <div class="flex gap-3 items-center justify-between">
            <div class="flex gap-3 items-center"><span>
                    <img src="./assets/Aperture.png" alt=""></span>
                <div class>
                    <div class="flex gap-2 items-center font-bold">
                        <h2 id="totalIssue" class="font-semibold text-xl">0</h2>
                        <p>Issues</p>
                    </div>

                    <p>Track and manage your project issues</p>
                </div>

            </div>


            <div class="flex gap-4 items-center">
                <span class=" size-3 rounded-full bg-green-600"></span>
                <p>Open</p>
                <span class=" size-3 rounded-full bg-[#A855F7]"></span>
                <p>Closed</p>
            </div>
        </div>
    </section>

    <div id="spinner" class="flex justify-center items-center py-10 hidden">
        <span class="loading loading-dots loading-xl"></span>
    </div>

    <section class="w-10/12 mx-auto card bg-base-100 card-xs shadow-sm p-6 ">
        <div id="issueCardContainer" class="grid grid-cols-4 gap-4">
